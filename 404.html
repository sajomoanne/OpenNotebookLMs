<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // GitHub Pages SPA routing fix
        // This script redirects all 404s back to index.html with the original path preserved
        (function() {
            var path = window.location.pathname;
            var search = window.location.search;
            var hash = window.location.hash;
            
            // If we're already at the root, no need to redirect
            if (path === '/' || path === '/index.html') {
                return;
            }
            
            // Build the redirect URL with the original path preserved
            var redirectUrl = '/' + path.replace(/^\//, '') + search + hash;
            
            // Store the intended path in sessionStorage so the router can handle it
            sessionStorage.setItem('intendedRoute', redirectUrl);
            
            // Redirect to index.html
            window.location.replace('/');
        })();
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0; url=/" />
    </noscript>
</head>
<body>
    <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
        <h1>Redirecting...</h1>
        <p>Please wait while we redirect you to the correct page.</p>
        <p>If you are not redirected automatically, <a href="/">click here</a>.</p>
    </div>
</body>
</html>
