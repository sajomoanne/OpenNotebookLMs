<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | OpenNotebookLMs</title>
    <meta name="description" content="Manage your account, profile, and privacy settings.">
    <meta name="robots" content="noindex, nofollow">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Initial Theme Logic (prevents flash)
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 dark:bg-darkBg text-gray-900 dark:text-gray-100 min-h-screen">
    <!-- Navigation Bar -->
    <nav class="sticky top-0 z-50 glass-morphism border-b border-gray-200 dark:border-gray-800 bg-white/80 dark:bg-darkBg/80 px-3 sm:px-6 py-3 sm:py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2 min-w-0 flex-1">
            <div class="bg-blue-600 p-2 rounded-lg shrink-0">
                <i data-lucide="book-open" class="text-white w-6 h-6"></i>
            </div>
            <a href="/" class="text-lg sm:text-2xl font-bold tracking-tight truncate">OpenNotebookLMs</a>
            <span class="hidden sm:inline-flex bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300 text-xs px-2 py-1 rounded-full ml-2 font-medium uppercase shrink-0">R&D Beta</span>
        </div>
        
        <div class="flex items-center space-x-2 sm:space-x-4 shrink-0">
            <!-- Theme Toggle -->
            <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                <i data-lucide="sun" id="sunIcon" class="w-5 h-5 hidden dark:block"></i>
                <i data-lucide="moon" id="moonIcon" class="w-5 h-5 block dark:hidden"></i>
            </button>
            
            <div id="authContainer" class="flex items-center">
                <button id="loginBtn" onclick="toggleModal('authModal')" class="text-xs sm:text-sm font-semibold whitespace-nowrap hover:text-blue-600 transition-colors mr-1 sm:mr-2">Login / Sign up</button>
                <div id="userAvatar" onclick="handleProfileClick()" class="hidden w-9 h-9 rounded-full bg-blue-100 dark:bg-blue-900 flex items-center justify-center text-blue-600 border border-blue-200 dark:border-blue-800 cursor-pointer hover:ring-2 hover:ring-blue-500 transition-all">
                    <i data-lucide="user" class="w-5 h-5"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Navigation Menu (optional enhancement) -->
    <div class="md:hidden border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-darkBg px-4 py-2">
        <div class="flex space-x-4 text-sm">
            <a href="/" data-nav-link class="text-gray-600 hover:text-blue-600 transition-colors">Home</a>
            <a href="/my-notebooks" data-nav-link class="text-gray-600 hover:text-blue-600 transition-colors">My Notebooks</a>
            <a href="/create" data-nav-link class="text-gray-600 hover:text-blue-600 transition-colors">Create</a>
            <a href="/settings" data-nav-link class="text-gray-600 hover:text-blue-600 transition-colors">Settings</a>
        </div>
    </div>

    <!-- Settings Content -->
    <main data-page-content class="max-w-4xl mx-auto px-4 sm:px-6 py-8">
        <div class="flex items-center mb-8">
            <button onclick="window.router?.redirect('/')" class="mr-4 p-2 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-lg transition-colors">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </button>
            <h1 class="text-2xl sm:text-3xl font-bold">Account & Settings</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-start">
            <div class="md:col-span-1 space-y-4 h-full">
                <div class="bg-white dark:bg-darkCard p-6 rounded-2xl border border-gray-200 dark:border-gray-700 h-full flex flex-col justify-between">
                    <div class="space-y-4">
                        <div class="flex items-center space-x-4">
                            <div class="w-16 h-16 rounded-full bg-blue-100 dark:bg-blue-900 flex items-center justify-center text-blue-600 text-2xl font-bold border-2 border-blue-200 dark:border-blue-800">
                                <span id="profileInitials">U</span>
                            </div>
                            <div>
                                <h2 class="text-xl font-bold" id="profileName">User</h2>
                                <p class="text-sm text-gray-500" id="profileEmail">user@example.com</p>
                                <div id="profileVerification" class="hidden mt-1 inline-flex items-center px-2 py-1 bg-green-100 text-green-700 text-xs rounded-full">
                                    <i data-lucide="check-circle" class="w-3 h-3 mr-1"></i> Verified
                                </div>
                                <div id="profileUnverified" class="hidden mt-1 inline-flex items-center px-2 py-1 bg-yellow-100 text-yellow-700 text-xs rounded-full">
                                    <i data-lucide="alert-circle" class="w-3 h-3 mr-1"></i> Unverified
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="space-y-3 mt-auto">
                        <button id="verifyBtn" onclick="verifyEmail()" class="w-full py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition-colors">Verify Email</button>
                        <button id="viewMyNotebooksBtn" onclick="window.router?.redirect('/my-notebooks')" class="hidden w-full py-2 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-200 rounded-lg text-sm font-bold hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                            View Notebooks
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="md:col-span-2 space-y-6">
                <div class="bg-white dark:bg-darkCard p-6 rounded-2xl border border-gray-200 dark:border-gray-700">
                    <h2 class="text-xl font-bold mb-4 flex items-center"><i data-lucide="settings" class="w-5 h-5 mr-2"></i> General Settings</h2>
                    <div class="space-y-4">
                        <div class="py-3 border-b border-gray-100 dark:border-gray-800">
                            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                                <div>
                                    <p class="font-semibold">Public name</p>
                                    <p class="text-xs text-gray-500">Shown as the author on shared notebooks</p>
                                </div>
                                <div class="flex items-center gap-2">
                                    <input id="publicNameInput" type="text" placeholder="e.g. Ojas M."
                                           class="w-40 sm:w-52 px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkBg text-sm outline-none focus:ring-2 focus:ring-blue-500">
                                    <button type="button" onclick="savePublicName()" class="px-3 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold">
                                        Save
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-white dark:bg-darkCard p-6 rounded-2xl border border-gray-200 dark:border-gray-700">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-red-500"><i data-lucide="shield-alert" class="w-5 h-5 mr-2"></i> Security</h2>
                    <div class="space-y-4">
                        <!-- Top row: Change Password and Change Email -->
                        <div class="flex flex-col sm:flex-row gap-3 justify-center">
                            <button onclick="showPasswordChangeModal()" class="flex-1 sm:flex-initial px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700 transition-colors">
                                Change Password
                            </button>
                            <button onclick="showEmailChangeModal()" class="flex-1 sm:flex-initial px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700 transition-colors">
                                Change Email
                            </button>
                        </div>
                        
                        <!-- Bottom row: Review Notebooks, Logout, Delete Account -->
                        <div class="flex flex-wrap gap-3 justify-center">
                            <button id="adminReviewBtn" onclick="window.router?.redirect('/admin-review')" class="hidden px-4 py-2 bg-purple-600 text-white rounded-lg text-sm font-bold hover:bg-purple-700 transition-colors">
                                <i data-lucide="clipboard-list" class="w-4 h-4 mr-2"></i> Review Notebooks
                            </button>
                            <button onclick="logout()" class="px-4 py-2 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-lg text-sm font-bold hover:bg-gray-200 transition-colors">
                                Logout
                            </button>
                            <button onclick="deleteAccount()" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-bold hover:bg-red-700 transition-colors">
                                Delete account
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Auth Modal -->
    <div id="authModal" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-darkCard rounded-2xl max-w-md w-full p-6 shadow-2xl relative">
            <button onclick="toggleModal('authModal')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <i data-lucide="x"></i>
            </button>
            <h2 class="text-2xl font-bold mb-2 text-center">Sign In / Up</h2>
            <div class="space-y-3 mb-4">
                <div>
                    <label for="auth_email" class="block text-sm font-semibold mb-1">Email</label>
                    <input id="auth_email" type="email" class="w-full p-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkBg outline-none focus:ring-2 focus:ring-blue-500" />
                </div>
                <div>
                    <label for="auth_password" class="block text-sm font-semibold mb-1">Password</label>
                    <input id="auth_password" type="password" class="w-full p-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkBg outline-none focus:ring-2 focus:ring-blue-500" />
                </div>
            </div>
            <div class="space-y-2">
                <button type="button" onclick="handleEmailAuth('login')" class="w-full py-2.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm transition-colors">
                    Log in
                </button>
                <button type="button" onclick="handleEmailAuth('signup')" class="w-full py-2.5 rounded-lg bg-gray-900 hover:bg-black text-white font-semibold text-sm transition-colors">
                    Create Account and Verify
                </button>
                <button type="button" onclick="handlePasswordReset()" class="w-full py-2 rounded-lg border border-gray-300 dark:border-gray-700 text-gray-800 dark:text-gray-100 text-sm font-semibold hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                    Forgot Password?
                </button>
            </div>
        </div>
    </div>

    <!-- Alert Toast -->
    <div id="toast" class="fixed bottom-6 right-6 translate-y-20 opacity-0 bg-white dark:bg-darkCard border border-gray-200 dark:border-gray-700 px-6 py-4 rounded-2xl shadow-2xl z-[100] transition-all flex items-center">
        <div id="toastIcon" class="mr-3"></div>
        <p id="toastMsg" class="font-medium"></p>
    </div>

    <!-- Password Change Modal -->
    <div id="passwordChangeModal" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-darkCard rounded-2xl max-w-md w-full p-6 shadow-2xl relative">
            <button onclick="toggleModal('passwordChangeModal')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <i data-lucide="x"></i>
            </button>
            <h2 class="text-2xl font-bold mb-4">Change Password</h2>
            <form onsubmit="changePassword(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Current Password</label>
                        <input type="password" id="currentPassword" required class="w-full p-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkBg outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">New Password</label>
                        <input type="password" id="newPassword" required minlength="6" class="w-full p-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkBg outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Confirm New Password</label>
                        <input type="password" id="confirmNewPassword" required minlength="6" class="w-full p-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkBg outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button type="button" onclick="toggleModal('passwordChangeModal')" class="flex-1 py-2.5 rounded-lg border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-200 font-semibold hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                        Cancel
                    </button>
                    <button type="submit" class="flex-1 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold transition-colors">
                        Update Password
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Email Change Modal -->
    <div id="emailChangeModal" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-darkCard rounded-2xl max-w-md w-full p-6 shadow-2xl relative">
            <button onclick="toggleModal('emailChangeModal')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <i data-lucide="x"></i>
            </button>
            <h2 class="text-2xl font-bold mb-4">Change Email</h2>
            <form onsubmit="changeEmail(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Current Password</label>
                        <input type="password" id="emailPassword" required class="w-full p-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkBg outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">New Email Address</label>
                        <input type="email" id="newEmail" required class="w-full p-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkBg outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button type="button" onclick="toggleModal('emailChangeModal')" class="flex-1 py-2.5 rounded-lg border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-200 font-semibold hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                        Cancel
                    </button>
                    <button type="submit" class="flex-1 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold transition-colors">
                        Update Email
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- FIREBASE MODULES -->
    <script type="module" src="router.js"></script>
    <script type="module" src="app.js"></script>
    <script>
        // Initialize Lucide icons
        if (window.lucide) {
            window.lucide.createIcons();
        }
        
        // Update authentication UI with delay to ensure auth state is ready
        setTimeout(() => {
            if (window.updateAuthUI) {
                window.updateAuthUI();
            }
        }, 100);
    </script>
</body>
</html>
